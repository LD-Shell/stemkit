<!DOCTYPE html>
<html lang="en" class="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>STEMdle | Daily Science Puzzle | STEMKit</title>
    <meta name="title" content="STEMdle | Daily Science Puzzle | STEMKit">
    <meta name="description" content="A daily 5-letter logic and vocabulary puzzle built for the STEM community. Test your knowledge and build your daily streak.">
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = { darkMode: 'class', theme: { extend: { fontFamily: { sans: ['Inter', 'sans-serif'] } } } };
        if (localStorage.theme === 'dark' || (!('theme' in localStorage) && window.matchMedia('(prefers-color-scheme: dark)').matches)) { document.documentElement.classList.add('dark'); }
    </script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        .tile { transition: transform 0.4s ease, background-color 0.4s ease; }
        .tile.flip { transform: rotateX(90deg); }
    </style>
</head>
<body class="bg-slate-50 dark:bg-slate-950 text-slate-900 dark:text-slate-100 min-h-screen flex flex-col transition-colors duration-300">

    <nav class="max-w-7xl mx-auto px-6 h-20 w-full flex justify-between items-center z-50">
        <a href="index.html" class="flex items-center gap-2 hover:opacity-80 transition-opacity">
            <div class="bg-indigo-600 text-white p-2 rounded-lg shadow-sm">
                <i class="fa-solid fa-flask text-xl"></i>
            </div>
            <span class="text-2xl font-black tracking-tighter">STEMKit</span>
        </a>
        <div class="flex items-center gap-6">
            <a href="index.html#focus-tools" class="hidden sm:block text-sm font-medium text-slate-500 hover:text-indigo-600 dark:hover:text-indigo-400">
                <i class="fa-solid fa-arrow-left mr-1"></i> Back
            </a>
            <button id="themeToggle" class="p-2 rounded-full hover:bg-slate-200 dark:hover:bg-slate-800 transition-colors text-slate-600 dark:text-slate-300">
                <i class="fa-solid fa-moon dark:hidden text-lg"></i>
                <i class="fa-solid fa-sun hidden dark:block text-yellow-400 text-lg"></i>
            </button>
        </div>
    </nav>

    <main class="flex-grow flex flex-col items-center justify-center px-4 py-8 w-full max-w-lg mx-auto">
        
        <header class="text-center mb-8">
            <h1 class="text-4xl font-black tracking-widest uppercase mb-2">STEMdle</h1>
            <div class="flex items-center justify-center gap-4 text-sm font-bold text-slate-500">
                <span id="streak-counter"><i class="fa-solid fa-fire text-orange-500"></i> Streak: 0</span>
                <span>|</span>
                <span id="games-played">Played: 0</span>
            </div>
        </header>

        <div id="grid" class="grid grid-rows-6 gap-2 mb-10 w-full max-w-[320px]">
            </div>

        <div id="keyboard" class="w-full flex flex-col gap-2 select-none">
            <div class="flex justify-center gap-1 sm:gap-2">
                <button class="key bg-slate-200 dark:bg-slate-700 hover:bg-slate-300 dark:hover:bg-slate-600 rounded font-bold uppercase flex-1 py-4 text-sm sm:text-base transition-colors" data-key="q">Q</button>
                <button class="key bg-slate-200 dark:bg-slate-700 hover:bg-slate-300 dark:hover:bg-slate-600 rounded font-bold uppercase flex-1 py-4 text-sm sm:text-base transition-colors" data-key="w">W</button>
                <button class="key bg-slate-200 dark:bg-slate-700 hover:bg-slate-300 dark:hover:bg-slate-600 rounded font-bold uppercase flex-1 py-4 text-sm sm:text-base transition-colors" data-key="e">E</button>
                <button class="key bg-slate-200 dark:bg-slate-700 hover:bg-slate-300 dark:hover:bg-slate-600 rounded font-bold uppercase flex-1 py-4 text-sm sm:text-base transition-colors" data-key="r">R</button>
                <button class="key bg-slate-200 dark:bg-slate-700 hover:bg-slate-300 dark:hover:bg-slate-600 rounded font-bold uppercase flex-1 py-4 text-sm sm:text-base transition-colors" data-key="t">T</button>
                <button class="key bg-slate-200 dark:bg-slate-700 hover:bg-slate-300 dark:hover:bg-slate-600 rounded font-bold uppercase flex-1 py-4 text-sm sm:text-base transition-colors" data-key="y">Y</button>
                <button class="key bg-slate-200 dark:bg-slate-700 hover:bg-slate-300 dark:hover:bg-slate-600 rounded font-bold uppercase flex-1 py-4 text-sm sm:text-base transition-colors" data-key="u">U</button>
                <button class="key bg-slate-200 dark:bg-slate-700 hover:bg-slate-300 dark:hover:bg-slate-600 rounded font-bold uppercase flex-1 py-4 text-sm sm:text-base transition-colors" data-key="i">I</button>
                <button class="key bg-slate-200 dark:bg-slate-700 hover:bg-slate-300 dark:hover:bg-slate-600 rounded font-bold uppercase flex-1 py-4 text-sm sm:text-base transition-colors" data-key="o">O</button>
                <button class="key bg-slate-200 dark:bg-slate-700 hover:bg-slate-300 dark:hover:bg-slate-600 rounded font-bold uppercase flex-1 py-4 text-sm sm:text-base transition-colors" data-key="p">P</button>
            </div>
            <div class="flex justify-center gap-1 sm:gap-2 px-4">
                <button class="key bg-slate-200 dark:bg-slate-700 hover:bg-slate-300 dark:hover:bg-slate-600 rounded font-bold uppercase flex-1 py-4 text-sm sm:text-base transition-colors" data-key="a">A</button>
                <button class="key bg-slate-200 dark:bg-slate-700 hover:bg-slate-300 dark:hover:bg-slate-600 rounded font-bold uppercase flex-1 py-4 text-sm sm:text-base transition-colors" data-key="s">S</button>
                <button class="key bg-slate-200 dark:bg-slate-700 hover:bg-slate-300 dark:hover:bg-slate-600 rounded font-bold uppercase flex-1 py-4 text-sm sm:text-base transition-colors" data-key="d">D</button>
                <button class="key bg-slate-200 dark:bg-slate-700 hover:bg-slate-300 dark:hover:bg-slate-600 rounded font-bold uppercase flex-1 py-4 text-sm sm:text-base transition-colors" data-key="f">F</button>
                <button class="key bg-slate-200 dark:bg-slate-700 hover:bg-slate-300 dark:hover:bg-slate-600 rounded font-bold uppercase flex-1 py-4 text-sm sm:text-base transition-colors" data-key="g">G</button>
                <button class="key bg-slate-200 dark:bg-slate-700 hover:bg-slate-300 dark:hover:bg-slate-600 rounded font-bold uppercase flex-1 py-4 text-sm sm:text-base transition-colors" data-key="h">H</button>
                <button class="key bg-slate-200 dark:bg-slate-700 hover:bg-slate-300 dark:hover:bg-slate-600 rounded font-bold uppercase flex-1 py-4 text-sm sm:text-base transition-colors" data-key="j">J</button>
                <button class="key bg-slate-200 dark:bg-slate-700 hover:bg-slate-300 dark:hover:bg-slate-600 rounded font-bold uppercase flex-1 py-4 text-sm sm:text-base transition-colors" data-key="k">K</button>
                <button class="key bg-slate-200 dark:bg-slate-700 hover:bg-slate-300 dark:hover:bg-slate-600 rounded font-bold uppercase flex-1 py-4 text-sm sm:text-base transition-colors" data-key="l">L</button>
            </div>
            <div class="flex justify-center gap-1 sm:gap-2">
                <button class="key flex-[1.5] bg-slate-300 dark:bg-slate-600 hover:bg-slate-400 dark:hover:bg-slate-500 rounded font-bold uppercase py-4 text-xs sm:text-sm transition-colors" data-key="Enter">ENTER</button>
                <button class="key bg-slate-200 dark:bg-slate-700 hover:bg-slate-300 dark:hover:bg-slate-600 rounded font-bold uppercase flex-1 py-4 text-sm sm:text-base transition-colors" data-key="z">Z</button>
                <button class="key bg-slate-200 dark:bg-slate-700 hover:bg-slate-300 dark:hover:bg-slate-600 rounded font-bold uppercase flex-1 py-4 text-sm sm:text-base transition-colors" data-key="x">X</button>
                <button class="key bg-slate-200 dark:bg-slate-700 hover:bg-slate-300 dark:hover:bg-slate-600 rounded font-bold uppercase flex-1 py-4 text-sm sm:text-base transition-colors" data-key="c">C</button>
                <button class="key bg-slate-200 dark:bg-slate-700 hover:bg-slate-300 dark:hover:bg-slate-600 rounded font-bold uppercase flex-1 py-4 text-sm sm:text-base transition-colors" data-key="v">V</button>
                <button class="key bg-slate-200 dark:bg-slate-700 hover:bg-slate-300 dark:hover:bg-slate-600 rounded font-bold uppercase flex-1 py-4 text-sm sm:text-base transition-colors" data-key="b">B</button>
                <button class="key bg-slate-200 dark:bg-slate-700 hover:bg-slate-300 dark:hover:bg-slate-600 rounded font-bold uppercase flex-1 py-4 text-sm sm:text-base transition-colors" data-key="n">N</button>
                <button class="key bg-slate-200 dark:bg-slate-700 hover:bg-slate-300 dark:hover:bg-slate-600 rounded font-bold uppercase flex-1 py-4 text-sm sm:text-base transition-colors" data-key="m">M</button>
                <button class="key flex-[1.5] bg-slate-300 dark:bg-slate-600 hover:bg-slate-400 dark:hover:bg-slate-500 rounded font-bold uppercase py-4 text-xs sm:text-sm transition-colors" data-key="Backspace"><i class="fa-solid fa-delete-left text-lg"></i></button>
            </div>
        </div>

    </main>

    <script src="js/stemdle.js"></script>
    <script>
        document.getElementById('themeToggle').addEventListener('click', () => {
            document.documentElement.classList.toggle('dark');
            localStorage.theme = document.documentElement.classList.contains('dark') ? 'dark' : 'light';
        });
    </script>
</body>
</html>
