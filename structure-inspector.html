<!DOCTYPE html>
<html lang="en" class="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <title>3D Structure Inspector | STEMKit</title>
    <meta name="title" content="3D Structure Inspector | STEMKit">
    <meta name="description" content="Visualize molecular dynamics trajectories, PDB structures, and interaction interfaces locally in your browser using WebGL.">
    <meta name="keywords" content="3d molecular viewer, pdb viewer online, 3dmol.js, computational chemistry, STEMKit">
    <meta name="author" content="STEMKit">
    <meta name="theme-color" content="#4f46e5">

    <link rel="canonical" href="https://stemkit.net/structure-inspector">

    <meta property="og:type" content="website">
    <meta property="og:url" content="https://stemkit.net/structure-inspector">
    <meta property="og:title" content="3D Structure Inspector | STEMKit">
    <meta property="og:description" content="Visualize PDB structures and molecular dynamics trajectories entirely client-side.">
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = { 
            darkMode: 'class', 
            theme: { extend: { fontFamily: { sans: ['Inter', 'sans-serif'] } } } 
        };
        if (localStorage.theme === 'dark' || (!('theme' in localStorage) && window.matchMedia('(prefers-color-scheme: dark)').matches)) { document.documentElement.classList.add('dark'); }
    </script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/3Dmol/2.0.4/3Dmol-min.js"></script>

    <script src="js/structure-inspector.js" defer></script>
</head>
<body class="bg-slate-50 dark:bg-slate-900 text-slate-900 dark:text-slate-100 min-h-screen flex flex-col transition-colors duration-300">

    <header class="border-b border-slate-200 dark:border-slate-800 bg-white dark:bg-slate-950 sticky top-0 z-50">
        <nav class="max-w-7xl mx-auto px-6 h-16 flex justify-between items-center" aria-label="Main Navigation">
            <a href="index.html" class="flex items-center gap-2 hover:opacity-80 transition-opacity">
                <i class="fa-solid fa-cube text-indigo-600 dark:text-indigo-400 text-xl" aria-hidden="true"></i>
                <span class="text-xl font-black tracking-tighter">STEMKit</span>
            </a>
            <button id="themeToggle" class="p-2 rounded-lg hover:bg-slate-100 dark:hover:bg-slate-800 transition-colors">
                <i class="fa-solid fa-moon dark:hidden"></i>
                <i class="fa-solid fa-sun hidden dark:block text-yellow-400"></i>
            </button>
        </nav>
    </header>

    <main class="flex-grow max-w-7xl mx-auto px-6 py-8 w-full flex flex-col gap-6">
        
        <section id="uploadZone" class="flex-grow flex flex-col items-center justify-center border-2 border-dashed border-indigo-300 dark:border-indigo-700 rounded-3xl bg-indigo-50/50 dark:bg-indigo-900/10 hover:bg-indigo-50 dark:hover:bg-indigo-900/20 transition-all cursor-pointer p-12 text-center group">
            <input type="file" id="fileInput" accept=".pdb,.xyz,.gro" class="hidden" aria-label="Upload molecular structure file">
            <div class="w-20 h-20 bg-indigo-100 dark:bg-indigo-900/50 rounded-2xl flex items-center justify-center mb-6 text-indigo-600 dark:text-indigo-400 group-hover:scale-110 transition-transform">
                <i class="fa-solid fa-microscope text-4xl"></i>
            </div>
            <h1 class="text-3xl font-bold mb-3">3D Structure Inspector</h1>
            <p class="text-slate-500 dark:text-slate-400 mb-6 max-w-md">Render your PDB or GRO coordinate files using hardware-accelerated WebGL. Verify your simulation geometry before submitting to SLURM.</p>
            <button class="bg-indigo-600 hover:bg-indigo-700 text-white px-8 py-3 rounded-xl font-medium transition-colors shadow-sm">
                Select Coordinate File
            </button>
        </section>

        <section id="workspace" class="hidden flex-col lg:flex-row gap-6 w-full h-[700px]">
            
            <div class="w-full lg:w-80 flex flex-col gap-4 bg-white dark:bg-slate-950 p-6 rounded-2xl border border-slate-200 dark:border-slate-800 shadow-sm overflow-y-auto">
                <div>
                    <h2 id="fileName" class="font-bold text-lg truncate">system.pdb</h2>
                    <p id="structureMeta" class="text-sm text-slate-500 dark:text-slate-400 mb-4">0 Atoms</p>
                    <button id="resetBtn" class="text-xs text-red-600 hover:text-red-700 font-medium text-left">
                        <i class="fa-solid fa-rotate-left mr-1"></i> Close viewer
                    </button>
                </div>
                
                <hr class="border-slate-200 dark:border-slate-800">

                <div class="flex flex-col gap-3">
                    <label class="block text-xs font-bold text-slate-500 uppercase">Rendering style</label>
                    <select id="styleSelect" class="w-full bg-slate-50 dark:bg-slate-900 border border-slate-200 dark:border-slate-700 rounded-lg px-3 py-2 text-sm focus:ring-2 focus:ring-indigo-500 outline-none">
                        <option value="stick">Stick</option>
                        <option value="sphere">Sphere (van der Waals)</option>
                        <option value="cross">Cross</option>
                        <option value="line">Wireframe</option>
                    </select>
                </div>

                <div class="flex flex-col gap-3">
                    <label class="block text-xs font-bold text-slate-500 uppercase">Color scheme</label>
                    <select id="colorSelect" class="w-full bg-slate-50 dark:bg-slate-900 border border-slate-200 dark:border-slate-700 rounded-lg px-3 py-2 text-sm focus:ring-2 focus:ring-indigo-500 outline-none">
                        <option value="element">By Element</option>
                        <option value="chain">By Chain</option>
                        <option value="residue">By Residue</option>
                        <option value="bFactor">By B-Factor</option>
                    </select>
                </div>

                <div class="flex flex-col gap-3 mt-4">
                    <label class="block text-xs font-bold text-slate-500 uppercase">View controls</label>
                    <button id="centerBtn" class="bg-slate-100 dark:bg-slate-800 hover:bg-slate-200 dark:hover:bg-slate-700 text-slate-700 dark:text-slate-300 py-2 rounded-lg text-sm font-medium transition-colors">
                        Recenter Coordinates
                    </button>
                    <button id="surfaceBtn" class="bg-slate-100 dark:bg-slate-800 hover:bg-slate-200 dark:hover:bg-slate-700 text-slate-700 dark:text-slate-300 py-2 rounded-lg text-sm font-medium transition-colors">
                        Toggle Solvent Surface
                    </button>
                </div>
            </div>

            <div class="flex-grow bg-white dark:bg-slate-950 border border-slate-200 dark:border-slate-800 rounded-2xl shadow-sm relative overflow-hidden">
                <div id="viewerCanvas" class="absolute inset-0 w-full h-full cursor-move"></div>
            </div>

        </section>
    </main>

    <div id="toastContainer" class="fixed bottom-6 right-6 z-50 flex flex-col gap-3"></div>

</body>
</html>
