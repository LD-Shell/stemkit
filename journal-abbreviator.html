<!DOCTYPE html>
<html lang="en" class="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <title>Journal Abbreviator | CASSI Formatter | STEMKit</title>
    <meta name="title" content="Journal Abbreviator | CASSI Formatter | STEMKit">
    <meta name="description" content="Instantly convert full journal names to their strict CASSI abbreviations for academic manuscripts. Client-side processing ensures complete privacy.">
    <meta name="keywords" content="journal abbreviation generator, CASSI formatter, standardize references, bibtex journal abbreviations, academic citation tool">
    <meta name="author" content="STEMKit">
    <meta name="theme-color" content="#ec4899"> <link rel="canonical" href="https://stemkit.net/journal-abbreviator.html">

    <meta property="og:type" content="website">
    <meta property="og:url" content="https://stemkit.net/journal-abbreviator.html">
    <meta property="og:title" content="Journal Abbreviator | CASSI Formatter">
    <meta property="og:description" content="Instantly convert full journal names to their strict CASSI abbreviations for academic manuscripts.">
    
    <script type="application/ld+json">
        {
        "@context": "https://schema.org",
        "@type": "WebApplication",
        "name": "STEMKit Journal Abbreviator",
        "url": "https://stemkit.net/journal-abbreviator.html",
        "description": "Standardize academic reference lists by converting full journal titles to their official abbreviations.",
        "applicationCategory": "UtilityApplication",
        "operatingSystem": "All",
        "browserRequirements": "Requires JavaScript",
        "offers": {
            "@type": "Offer",
            "price": "0",
            "priceCurrency": "USD"
        }
        }
    </script>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = { 
            darkMode: 'class', 
            theme: { extend: { fontFamily: { sans: ['Inter', 'sans-serif'] } } } 
        };
        if (localStorage.theme === 'dark' || (!('theme' in localStorage) && window.matchMedia('(prefers-color-scheme: dark)').matches)) { document.documentElement.classList.add('dark'); }
    </script>
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        .custom-scroll::-webkit-scrollbar { width: 6px; height: 6px; }
        .custom-scroll::-webkit-scrollbar-track { background: transparent; }
        .custom-scroll::-webkit-scrollbar-thumb { background-color: #cbd5e1; border-radius: 20px; }
        .dark .custom-scroll::-webkit-scrollbar-thumb { background-color: #475569; }
        
        /* Highlight applied changes */
        .hl-change { background-color: rgba(236, 72, 153, 0.2); border-bottom: 2px solid #ec4899; padding: 0 2px; border-radius: 2px; }
    </style>
</head>
<body class="bg-slate-50 dark:bg-slate-950 text-slate-900 dark:text-slate-100 min-h-screen flex flex-col font-sans transition-colors duration-300">

    <nav class="max-w-7xl mx-auto px-6 h-20 w-full flex justify-between items-center border-b border-slate-200 dark:border-slate-800">
        <a href="index.html" class="flex items-center gap-2 hover:opacity-80 transition-opacity">
            <div class="bg-indigo-600 text-white p-2 rounded-lg shadow-sm">
                <i class="fa-solid fa-flask text-xl"></i>
            </div>
            <span class="text-2xl font-black tracking-tighter">STEMKit</span>
        </a>
        <div class="flex items-center gap-4">
            <button id="themeToggle" class="p-2 rounded-full hover:bg-slate-200 dark:hover:bg-slate-800 transition-colors text-slate-600 dark:text-slate-300">
                <i class="fa-solid fa-moon dark:hidden text-lg"></i>
                <i class="fa-solid fa-sun hidden dark:block text-yellow-400 text-lg"></i>
            </button>
        </div>
    </nav>

    <main class="flex-grow max-w-7xl mx-auto px-6 py-8 w-full flex flex-col gap-6">
        
        <header class="mb-4">
            <div class="inline-flex items-center gap-2 bg-pink-100 dark:bg-pink-900/30 text-pink-700 dark:text-pink-400 px-3 py-1 rounded-full text-xs font-bold uppercase tracking-widest mb-4 border border-pink-200 dark:border-pink-800/50">
                <i class="fa-solid fa-spell-check"></i> Formatting utility
            </div>
            <h1 class="text-4xl font-black mb-2 tracking-tight">Journal Abbreviator</h1>
            <p class="text-slate-500 dark:text-slate-400 max-w-3xl leading-relaxed">
                Paste your reference list or BibTeX file below. The engine will instantly parse the text and replace full journal titles with their standardized CASSI abbreviations.
            </p>
        </header>

        <div id="toastContainer" class="fixed top-5 left-1/2 transform -translate-x-1/2 z-50 flex flex-col gap-2 pointer-events-none"></div>

        <div class="flex flex-col lg:flex-row gap-6 h-[calc(100vh-260px)] min-h-[500px]">
            
            <div class="w-full lg:w-1/2 flex flex-col gap-4">
                <div class="bg-white dark:bg-slate-900 rounded-2xl border border-slate-200 dark:border-slate-800 shadow-sm p-4 flex flex-col flex-grow">
                    <div class="flex justify-between items-center mb-2">
                        <h2 class="text-sm font-bold text-slate-800 dark:text-slate-200 uppercase tracking-wider">Raw Input</h2>
                        <button id="btnClear" class="text-[10px] text-slate-400 hover:text-red-500 uppercase font-bold transition-colors">Clear</button>
                    </div>
                    <textarea id="dataInput" class="w-full flex-grow bg-slate-50 dark:bg-slate-950 border border-slate-200 dark:border-slate-700 rounded-xl p-3 text-xs font-mono focus:ring-2 focus:ring-pink-500 outline-none resize-none whitespace-pre overflow-auto custom-scroll" spellcheck="false" placeholder="Paste bibliography here...&#10;&#10;E.g., Smith, J. et al., Journal of the American Chemical Society, 2024."></textarea>
                </div>
            </div>

            <div class="w-full lg:w-1/2 flex flex-col gap-4">
                <div class="bg-slate-900 rounded-2xl border border-slate-800 shadow-xl flex flex-col flex-grow relative overflow-hidden">
                    <div class="bg-slate-950 px-4 py-3 flex justify-between items-center border-b border-slate-800 shrink-0">
                        <div class="flex items-center gap-3">
                            <span class="text-sm font-bold text-pink-400 uppercase tracking-wider font-mono">Abbreviated Output</span>
                            <span id="statsLabel" class="bg-slate-800 text-slate-300 text-[10px] px-2 py-0.5 rounded font-mono">0 Changes</span>
                        </div>
                        <div class="flex gap-2">
                            <label class="flex items-center gap-2 text-xs font-bold text-slate-400 cursor-pointer mr-2">
                                <input type="checkbox" id="toggleHighlights" checked class="w-3 h-3 text-pink-600 bg-slate-800 border-slate-600 rounded focus:ring-pink-500">
                                Highlight
                            </label>
                            <button id="btnCopyText" class="bg-pink-600 hover:bg-pink-500 text-white px-3 py-1.5 rounded-lg text-xs font-bold transition-all shadow-md transform hover:-translate-y-0.5 active:scale-95 flex items-center gap-1">
                                <i class="fa-regular fa-copy"></i> Copy Text
                            </button>
                        </div>
                    </div>
                    
                    <textarea id="rawOutput" class="hidden"></textarea>
                    
                    <div id="visualOutput" class="flex-grow p-4 overflow-auto custom-scroll text-slate-300 font-mono text-xs leading-relaxed whitespace-pre-wrap select-all">Waiting for input...</div>
                </div>
            </div>

        </div>
    </main>

    <script src="js/journal-abbreviator.js"></script>
</body>
</html>
