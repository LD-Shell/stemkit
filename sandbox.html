    <meta property="og:title" content="Kinetic Sandbox | Physics Simulator">

    <meta property="og:type" content="website">
    <meta property="og:image" content="https://stemkit.net/assets/og-image.webp">
    <meta property="twitter:card" content="summary_large_image">
    <meta property="twitter:image" content="https://stemkit.net/assets/og-image.webp">

    <link rel="icon" type="image/x-icon" href="https://stemkit.net/assets/favicon.ico">
    <link rel="icon" type="image/png" sizes="32x32" href="https://stemkit.net/assets/favicon-32x32.png">
    <link rel="icon" type="image/png" sizes="16x16" href="https://stemkit.net/assets/favicon-16x16.png">
    <link rel="apple-touch-icon" href="https://stemkit.net/assets/apple-touch-icon.png">
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/all.min.css">
    
    <style>
        .tool-card { transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); }
        .tool-card:hover { transform: translateY(-6px); box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1), 0 10px 10px -5px rgba(0, 0, 0, 0.04); }
        .dark .tool-card:hover { box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.5); }
        .hero-bg { background-image: radial-gradient(at 0% 0%, rgba(99, 102, 241, 0.08) 0px, transparent 50%), radial-gradient(at 100% 0%, rgba(16, 185, 129, 0.08) 0px, transparent 50%); }
        .dark .hero-bg { background-image: radial-gradient(at 0% 0%, rgba(99, 102, 241, 0.15) 0px, transparent 50%), radial-gradient(at 100% 0%, rgba(16, 185, 129, 0.15) 0px, transparent 50%); }
    </style>
    <link rel="stylesheet" href="src/output.css">
</head>
<body class="bg-slate-50 dark:bg-slate-950 text-slate-900 dark:text-slate-100 min-h-screen flex flex-col transition-colors duration-300 overflow-hidden relative">

    <nav class="absolute top-0 z-50 w-full bg-transparent pointer-events-auto transition-colors duration-300">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex justify-between items-center h-16 sm:h-20">
                <a href="index.html" class="flex items-center gap-2 hover:opacity-80 transition-opacity">
                    <div class="bg-indigo-600 text-white p-2 sm:p-2.5 rounded-lg shadow-sm flex items-center justify-center">
                        <i class="fa-solid fa-flask text-lg sm:text-xl"></i>
                    </div>
                    <span class="text-xl sm:text-2xl font-black tracking-tighter text-slate-900 dark:text-white drop-shadow-md">STEMKit</span>
                </a>

                <div class="hidden md:flex items-center gap-6 text-sm font-semibold text-slate-600 dark:text-slate-300">
                    <a href="index.html#data-tools" class="hover:text-indigo-600 dark:hover:text-indigo-400 transition-colors drop-shadow-md bg-white/50 dark:bg-black/50 px-3 py-1 rounded-full backdrop-blur-sm">Data</a>
                    <a href="index.html#comp-tools" class="hover:text-indigo-600 dark:hover:text-indigo-400 transition-colors drop-shadow-md bg-white/50 dark:bg-black/50 px-3 py-1 rounded-full backdrop-blur-sm">Compute</a>
                    <a href="index.html#pub-tools" class="hover:text-indigo-600 dark:hover:text-indigo-400 transition-colors drop-shadow-md bg-white/50 dark:bg-black/50 px-3 py-1 rounded-full backdrop-blur-sm">Publish</a>
                    <a href="index.html#focus-tools" class="hover:text-indigo-600 dark:hover:text-indigo-400 transition-colors drop-shadow-md bg-white/50 dark:bg-black/50 px-3 py-1 rounded-full backdrop-blur-sm">Focus</a>
                    
                    <button class="themeToggle p-2 rounded-full bg-white/50 dark:bg-black/50 hover:bg-white/80 dark:hover:bg-slate-800 backdrop-blur-md transition-colors shadow-lg" aria-label="Toggle dark mode">
                        <i class="fa-solid fa-moon dark:hidden text-lg"></i>
                        <i class="fa-solid fa-sun hidden dark:block text-yellow-400 text-lg"></i>
                    </button>
                    
                    <a href="plot-digitizer.html" class="bg-indigo-600 hover:bg-indigo-700 text-white px-5 py-2.5 rounded-full text-sm font-bold transition-all shadow-md hover:shadow-lg">
                        <i class="fa-solid fa-crosshairs mr-1"></i> Digitizer Pro
                    </a>
                </div>

                <div class="flex items-center gap-2 md:hidden">
                    <button class="themeToggle p-2 rounded-full bg-white/50 dark:bg-black/50 hover:bg-white/80 dark:hover:bg-slate-800 backdrop-blur-md transition-colors shadow-lg">
                        <i class="fa-solid fa-moon dark:hidden text-lg"></i>
                        <i class="fa-solid fa-sun hidden dark:block text-yellow-400 text-lg"></i>
                    </button>
                    <button id="mobile-menu-btn" class="text-slate-900 dark:text-white hover:text-indigo-600 p-2 focus:outline-none drop-shadow-md">
                        <i class="fa-solid fa-bars text-2xl" id="menu-icon"></i>
                    </button>
                </div>
            </div>
        </div>

        <div id="mobile-menu" class="hidden md:hidden bg-white/95 dark:bg-slate-900/95 backdrop-blur-md border-b border-slate-200 dark:border-slate-800 absolute w-full shadow-xl">
            <div class="px-4 pt-2 pb-6 space-y-2 text-base font-semibold text-slate-600 dark:text-slate-300">
                <a href="index.html#data-tools" class="mobile-link block py-3 px-4 rounded-xl hover:bg-slate-50 dark:hover:bg-slate-800 hover:text-indigo-600 transition-colors">Data & Stats</a>
                <a href="index.html#comp-tools" class="mobile-link block py-3 px-4 rounded-xl hover:bg-slate-50 dark:hover:bg-slate-800 hover:text-indigo-600 transition-colors">Compute</a>
                <a href="index.html#pub-tools" class="mobile-link block py-3 px-4 rounded-xl hover:bg-slate-50 dark:hover:bg-slate-800 hover:text-indigo-600 transition-colors">Publish</a>
                <a href="index.html#focus-tools" class="mobile-link block py-3 px-4 rounded-xl hover:bg-slate-50 dark:hover:bg-slate-800 hover:text-indigo-600 transition-colors">Focus & Flow</a>
                <div class="pt-4 mt-2 border-t border-slate-100 dark:border-slate-800">
                    <a href="plot-digitizer.html" class="block text-center bg-indigo-600 hover:bg-indigo-700 text-white py-3 rounded-xl shadow-md transition-colors">Digitizer Pro</a>
                </div>
            </div>
        </div>
    </nav>

    <main class="flex-grow relative bg-slate-100 dark:bg-slate-900 flex items-center justify-center overflow-hidden">
        <canvas id="sandboxCanvas" class="absolute inset-0 w-full h-full cursor-crosshair"></canvas>
        
        <div class="absolute bottom-8 left-1/2 -translate-x-1/2 bg-white/70 dark:bg-slate-900/70 backdrop-blur-md px-6 py-3 rounded-full shadow-2xl border border-white/20 dark:border-slate-700/50 flex items-center gap-6 pointer-events-auto z-10">
            <span class="text-sm font-bold text-slate-600 dark:text-slate-300">Move mouse to repel</span>
            <div class="h-4 w-px bg-slate-300 dark:bg-slate-600"></div>
            <button id="btn-reset-particles" class="text-sm font-bold text-indigo-600 dark:text-indigo-400 hover:opacity-70 transition-opacity">
                <i class="fa-solid fa-rotate-right mr-1"></i> Reset
            </button>
        </div>
    </main>

    <script>
        // 1. Theme toggle logic (Mobile & Desktop)
        document.querySelectorAll('.themeToggle').forEach(btn => {
            btn.addEventListener('click', () => {
                document.documentElement.classList.toggle('dark');
                localStorage.theme = document.documentElement.classList.contains('dark') ? 'dark' : 'light';
            });
        });

        // 2. Mobile menu logic
        const mobileMenuBtn = document.getElementById('mobile-menu-btn');
        const mobileMenu = document.getElementById('mobile-menu');
        const menuIcon = document.getElementById('menu-icon');

        if(mobileMenuBtn) {
            mobileMenuBtn.addEventListener('click', () => {
                mobileMenu.classList.toggle('hidden');
                if(mobileMenu.classList.contains('hidden')) {
                    menuIcon.classList.remove('fa-xmark');
                    menuIcon.classList.add('fa-bars');
                } else {
                    menuIcon.classList.remove('fa-bars');
                    menuIcon.classList.add('fa-xmark');
                }
            });

            document.querySelectorAll('.mobile-link').forEach(link => {
                link.addEventListener('click', () => {
                    mobileMenu.classList.add('hidden');
                    menuIcon.classList.remove('fa-xmark');
                    menuIcon.classList.add('fa-bars');
                });
            });
        }
    </script>
    <script src="js/sandbox.js"></script>
</body>
</html>
