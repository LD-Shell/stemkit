<!DOCTYPE html>
<html lang="en" class="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <title>Kinetic Sandbox | Physics Simulator | STEMKit</title>
    <meta name="title" content="Kinetic Sandbox | Physics Simulator | STEMKit">
    <meta name="description" content="A high-performance, browser-rendered fluid and particle physics simulator. Clear your mind with interactive kinetic art.">
    <meta name="keywords" content="particle simulator, fluid dynamics, canvas animation, webgl, interactive physics, kinetic art, focus tool">
    <meta name="author" content="STEMKit">
    <meta name="theme-color" content="#4f46e5">

    <link rel="canonical" href="https://stemkit.net/sandbox.html">

    <meta property="og:type" content="website">
    <meta property="og:url" content="https://stemkit.net/sandbox.html">
    <meta property="og:title" content="Kinetic Sandbox | Physics Simulator">
    <meta property="og:description" content="Clear your mind with high-performance interactive kinetic art.">
    <meta property="og:image" content="https://stemkit.net/assets/og-sandbox.webp">

    <link rel="icon" type="image/x-icon" href="https://stemkit.net/assets/favicon.ico">
    <link rel="apple-touch-icon" href="https://stemkit.net/assets/apple-touch-icon.png">

    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = { darkMode: 'class', theme: { extend: { fontFamily: { sans: ['Inter', 'sans-serif'] } } } };
        if (localStorage.theme === 'dark' || (!('theme' in localStorage) && window.matchMedia('(prefers-color-scheme: dark)').matches)) { document.documentElement.classList.add('dark'); }
    </script>
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="bg-slate-50 dark:bg-slate-950 text-slate-900 dark:text-slate-100 min-h-screen flex flex-col transition-colors duration-300 overflow-hidden">

    <nav class="absolute top-0 left-0 right-0 max-w-7xl mx-auto px-6 h-20 w-full flex justify-between items-center z-50 pointer-events-auto text-white">
        <a href="index.html" class="flex items-center gap-2 hover:opacity-80 transition-opacity">
            <div class="bg-indigo-600 text-white p-2 rounded-lg shadow-sm">
                <i class="fa-solid fa-flask text-xl"></i>
            </div>
            <span class="text-2xl font-black tracking-tighter text-slate-900 dark:text-white drop-shadow-md">STEMKit</span>
        </a>
        
        <div class="flex items-center gap-6">
            <a href="index.html#focus-tools" class="hidden sm:block text-sm font-bold text-slate-500 hover:text-indigo-600 dark:hover:text-indigo-400 transition-colors drop-shadow-md">
                <i class="fa-solid fa-arrow-left mr-1"></i> Exit Sandbox
            </a>
            <button id="themeToggle" class="p-2 rounded-full bg-white/20 hover:bg-white/40 backdrop-blur-md transition-colors text-slate-900 dark:text-white shadow-lg">
                <i class="fa-solid fa-moon dark:hidden text-lg"></i>
                <i class="fa-solid fa-sun hidden dark:block text-yellow-400 text-lg"></i>
            </button>
        </div>
    </nav>

    <main class="flex-grow relative bg-slate-100 dark:bg-slate-900 flex items-center justify-center">
        <canvas id="sandboxCanvas" class="absolute inset-0 w-full h-full cursor-crosshair"></canvas>
        
        <div class="absolute bottom-8 left-1/2 -translate-x-1/2 bg-white/70 dark:bg-slate-900/70 backdrop-blur-md px-6 py-3 rounded-full shadow-2xl border border-white/20 dark:border-slate-700/50 flex items-center gap-6 pointer-events-auto">
            <span class="text-sm font-bold text-slate-600 dark:text-slate-300">Move mouse to repel</span>
            <div class="h-4 w-px bg-slate-300 dark:bg-slate-600"></div>
            <button id="btn-reset-particles" class="text-sm font-bold text-indigo-600 dark:text-indigo-400 hover:opacity-70 transition-opacity">
                <i class="fa-solid fa-rotate-right mr-1"></i> Reset
            </button>
        </div>
    </main>

    <script src="js/sandbox.js"></script>
    <script>
        document.getElementById('themeToggle').addEventListener('click', () => {
            document.documentElement.classList.toggle('dark');
            localStorage.theme = document.documentElement.classList.contains('dark') ? 'dark' : 'light';
        });
    </script>
</body>
</html>
